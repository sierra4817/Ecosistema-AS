<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS Académico - Visión Trading Pro</title>
  <link rel="stylesheet" href="styles.css?v=6">
  <!-- Google Fonts for Luxury Brand style -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Course Data Database -->
  <script src="cursos_data.js"></script>
</head>
<body style="background-color: #000000; color: #f3f4f6; font-family: 'Inter', sans-serif;">

  <!-- Header Section -->
  <header>
    <div class="logo-container">
      <div class="logo-icon">
        <svg width="40" height="35" viewBox="0 0 40 35" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="10" width="6" height="15" rx="1" fill="#10b981"/>
          <line x1="11" y1="4" x2="11" y2="30" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
          <rect x="17" y="6" width="6" height="20" rx="1" fill="#3b82f6"/>
          <line x1="20" y1="2" x2="20" y2="32" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
          <rect x="26" y="14" width="6" height="12" rx="1" fill="#ef4444"/>
          <line x1="29" y1="8" x2="29" y2="28" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <span>VISIÓN</span>
        <span class="logo-sub">TRADING PRO</span>
      </div>
    </div>

    <!-- Navigation settings and voice narrator button -->
    <div style="display: flex; align-items: center; gap: 12px; margin-left: auto; margin-right: 12px;">
      <a href="../index.html" class="indicator-toggle" style="background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.35); color: #00d2ff; text-decoration: none; cursor: pointer; padding: 8px 14px; border-radius: 50px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; transition: 0.2s ease;">
        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Dashboard
      </a>
      <button id="btn-audio-narrate" class="indicator-toggle" style="background: rgba(36, 47, 61, 0.4); border: 1px solid var(--border-color); color: #f3f4f6; cursor: pointer; padding: 8px 14px; border-radius: 50px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem;">
        <i data-lucide="volume-2" style="width: 16px; height: 16px;"></i> <span>Narrar Lección</span>
      </button>
    </div>

    <!-- Profile card -->
    <div class="user-profile">
      <div class="user-info">
        <span class="user-name">Albert</span>
        <span class="user-handle">@vision.trader7</span>
      </div>
      <img src="logo-transp.png" onerror="this.src='LOGO.jpg';" alt="Albert Profile" class="user-avatar">
    </div>
  </header>

  <div class="app-container">
    
    <!-- Sidebar Navigation for 10 Pilares -->
    <aside style="background: rgba(10, 10, 10, 0.85); border-right: 1px solid var(--border-color); padding: 20px;">
      <div class="progress-widget">
        <div class="progress-header">
          <span class="progress-title">Progreso Académico</span>
          <span id="progress-text" class="progress-percentage">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progress-bar" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
      </div>

      <ul class="menu-list" id="sidebar-pillars-menu" style="display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: calc(100vh - 180px); padding-bottom: 20px;">
        <!-- Dynamically rendered by JavaScript -->
      </ul>
    </aside>

    <!-- Main Content Area -->
    <main style="background-color: #000000; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px;">
      
      <!-- Lesson Card -->
      <div class="card" id="lesson-card-container" style="background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 28px;">
        <span id="lesson-module-tag" style="font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 2px; color: var(--text-secondary); text-transform: uppercase;">Módulo 1</span>
        <h1 id="lesson-title" style="font-family: 'Playfair Display', serif; color: #d4af37; font-size: 2rem; margin-top: 8px; margin-bottom: 24px; font-weight: 700;">Cargando lección...</h1>
        
        <!-- Interactive Technical SVG Graphic Support -->
        <div id="graphic-wrapper" style="margin-bottom: 24px;">
          <div class="canvas-container" style="background: #080a0f; border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 320px;">
            <svg id="academic-svg-canvas" viewBox="0 0 500 220" style="width: 100%; max-width: 720px; height: auto; display: block;">
              <!-- Drawn dynamically by JS -->
            </svg>
          </div>
        </div>

        <!-- Technical Content Rich Text -->
        <div class="lesson-body" id="lesson-body-content" style="line-height: 1.7; font-size: 0.95rem; color: #d1d5db; display: flex; flex-direction: column; gap: 16px;">
          <!-- Loaded dynamically -->
        </div>
      </div>

      <!-- Mentalidad Estoica Card -->
      <div class="card" id="mindset-card-container" style="background: linear-gradient(135deg, rgba(212, 175, 55, 0.03) 0%, rgba(10, 10, 10, 0.8) 100%); border: 1px solid rgba(212, 175, 55, 0.25); border-radius: var(--radius-lg); padding: 24px;">
        <h3 style="font-family: var(--font-sans); color: #d4af37; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="shield" style="width: 16px; height: 16px;"></i> Mentalidad Operativa (Foco Estoico)
        </h3>
        <p id="lesson-mindset-text" style="font-style: italic; color: #e5e7eb; font-size: 0.95rem; line-height: 1.6; padding-left: 12px; border-left: 2px solid #d4af37;">
          <!-- Loaded dynamically -->
        </p>
      </div>

      <!-- Challenge / Bitácora Input Area -->
      <div class="card" style="background: rgba(10, 10, 10, 0.6); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px;">
        <h3 style="font-family: var(--font-sans); color: #00ffff; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="book-open"></i> Desafío Práctico de Bitácora
        </h3>
        <p id="lesson-challenge-desc" style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 16px;">
          <!-- Loaded dynamically -->
        </p>
        <textarea id="challenge-response-input" placeholder="Escribe aquí tu análisis, observaciones técnicas o compromiso de mentalidad..." style="width: 100%; height: 100px; background: rgba(5, 5, 5, 0.8); border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: #f3f4f6; padding: 12px; font-family: inherit; font-size: 0.9rem; resize: none; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='rgba(0, 255, 255, 0.5)'" onblur="this.style.borderColor='var(--border-color)'"></textarea>
        <button id="btn-save-challenge" class="indicator-toggle" style="background: rgba(0, 255, 255, 0.1); border: 1px solid rgba(0, 255, 255, 0.3); color: #00ffff; font-weight: 600; padding: 10px 18px; border-radius: var(--radius-sm); margin-top: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem;">
          <i data-lucide="save" style="width: 15px; height: 15px;"></i> Guardar en Bitácora
        </button>
      </div>

      <!-- Quiz Card (Displayed on Exam Days: 7, 14, 21, 28, 35, 42, 49, 56, 63, 70) -->
      <div class="card" id="exam-quiz-card" style="background: rgba(13, 10, 6, 0.85); border: 1px solid rgba(212, 175, 55, 0.35); border-radius: var(--radius-lg); padding: 28px; display: none;">
        <h3 style="color: #d4af37; font-family: var(--font-sans); font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="award"></i> Evaluación Semanal de Módulo
        </h3>
        <div id="quiz-question-container">
          <!-- Loaded dynamically -->
        </div>
      </div>

      <!-- Navigation buttons -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 16px; margin-bottom: 40px;">
        <button id="btn-prev-lesson" class="btn" style="background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: #9ca3af; width: auto; min-width: 160px; padding: 12px 24px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem;">
          <i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i> Lección Anterior
        </button>
        <button id="btn-next-lesson" class="btn btn-pago-dorado" style="width: auto; min-width: 220px; padding: 12px 30px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; font-size: 0.85rem; letter-spacing: 1px;">
          <span>Siguiente Lección</span> <i data-lucide="chevron-right" style="width: 16px; height: 16px;"></i>
        </button>
      </div>

    </main>
  </div>

  <script>
    // 10 Pilares configuration
    const pilares = window.courseModules || [
      { id: 1, name: "Pilar 1: Mentalidad Ganadora", icon: "brain" },
      { id: 2, name: "Pilar 2: Gestión y Disciplina", icon: "shield-check" },
      { id: 3, name: "Pilar 3: Estrategia de Alta Probabilidad", icon: "trending-up" },
      { id: 4, name: "Pilar 4: Ejecución y Evaluación", icon: "activity" },
      { id: 5, name: "Pilar 5: Bloques de Órdenes", icon: "box" },
      { id: 6, name: "Pilar 6: Liquidez Avanzada", icon: "target" },
      { id: 7, name: "Pilar 7: Vacíos de Liquidez (FVG)", icon: "split" },
      { id: 8, name: "Pilar 8: Análisis Fractal (HTF/LTF)", icon: "layers" },
      { id: 9, name: "Pilar 9: Especulación de Fondos", icon: "award" },
      { id: 10, name: "Pilar 10: Plan de Negocios y Retiros", icon: "check-square" }
    ];

    // Quizzes for all 10 modules
    const quizzes = {
      1: [
        { q: "¿Cuál es la única realidad objetiva del mercado?", options: ["Las noticias macroeconómicas", "El consenso del precio en tiempo real", "Los indicadores técnicos rezagados"], answer: 1 }
      ],
      2: [
        { q: "¿Qué porcentaje de ganancia necesitas para recuperarte de un drawdown del 50%?", options: ["50%", "75%", "100%"], answer: 2 }
      ],
      3: [
        { q: "¿Qué requiere un BOS (Break of Structure) alcista real?", options: ["Que una vela traspase el nivel con mecha rápida", "Que la vela cierre con su cuerpo por encima del máximo anterior", "Que el RSI esté sobrecomprado"], answer: 1 }
      ],
      4: [
        { q: "¿Cómo actúa la EMA 200 en tu checklist operativo?", options: ["Como oscilador de momentum", "Como brújula de tendencia mayor para filtrar operaciones", "Como nivel de stop loss fijo"], answer: 1 }
      ],
      5: [
        { q: "¿Qué representa un Order Block (OB) institucional?", options: ["La última vela de sentido contrario antes de una expansión impulsiva de volumen", "Una media móvil ponderada", "El volumen de contratos acumulado al cierre de la sesión"], answer: 0 }
      ],
      6: [
        { q: "¿Por qué las instituciones realizan un sweep o barrido de mínimos previos (SSL)?", options: ["Para inducir compras minoristas caras", "Para activar Stop Losses minoristas (órdenes de venta) y absorberlos como contrapartida barata", "Para cerrar la sesión de trading rápidamente"], answer: 1 }
      ],
      7: [
        { q: "¿Qué es un Fair Value Gap (FVG)?", options: ["Un soporte histórico de polaridad", "Un desequilibrio de 3 velas donde el precio se entregó de forma unilateral dejando un vacío", "El volumen transaccionado en el POC"], answer: 1 }
      ],
      8: [
        { q: "¿Qué es la alineación temporal perfecta en SMC?", options: ["Esperar que coincida la apertura de Nueva York y Londres", "Identificar un POI HTF y esperar un CHoCH + FVG local en temporalidad LTF", "Operar a favor de los osciladores en diario"], answer: 1 }
      ],
      9: [
        { q: "¿Qué hace la regla del Trailing Drawdown en una Prop Firm?", options: ["Persigue el saldo máximo de tu cuenta reduciendo tu margen de pérdida permitido", "Permite pérdidas ilimitadas", "Aumenta tus lotes automáticamente"], answer: 0 }
      ],
      10: [
        { q: "¿Cuál es el enfoque correcto para el escalamiento de contratos?", options: ["Aumentar lotes tras una racha de pérdidas para recuperar rápido", "Aumentar lotes gradualmente basados en el crecimiento matemático de tu colchón de drawdown", "Mantener siempre el mismo apalancamiento sin importar el balance"], answer: 1 }
      ]
    };

    // State Variables
    let currentDayId = "day1";
    let courseData = {};
    let progressState = {
      days: {},
      quizzes: { 1: false, 2: false, 3: false, 4: false, 5: false, 6: false, 7: false, 8: false, 9: false, 10: false }
    };
    let activeAccordion = 1;
    let selectedQuizAnswers = {};

    // Load data from JSON or local script
    async function init() {
      try {
        if (typeof window.courseData !== 'undefined') {
          courseData = window.courseData;
        } else {
          const response = await fetch("cursos_data.json");
          const json = await response.json();
          courseData = json.lessons;
        }

        // Load progress from localStorage
        const saved = localStorage.getItem("vision_70day_progress");
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            progressState = parsed;
            // Backwards compatibility or initialize missing pillars
            if (!progressState.quizzes) progressState.quizzes = {};
            for(let i=1; i<=10; i++) {
              if (progressState.quizzes[i] === undefined) progressState.quizzes[i] = false;
            }
          } catch(e) {
            console.error("Error reading saved progress", e);
          }
        } else {
          // Initialize empty progress for 70 days
          Object.keys(courseData).forEach((key, index) => {
            progressState.days[key] = {
              completed: false,
              unlocked: index === 0
            };
          });
          localStorage.setItem("vision_70day_progress", JSON.stringify(progressState));
        }

        // Get day from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const dayParam = urlParams.get("day");
        if (dayParam && courseData["day" + dayParam]) {
          currentDayId = "day" + dayParam;
        } else {
          // Open latest unlocked day
          const unlockedDays = Object.keys(courseData).filter(k => progressState.days[k]?.unlocked);
          if (unlockedDays.length > 0) {
            currentDayId = unlockedDays[unlockedDays.length - 1];
          }
        }

        activeAccordion = courseData[currentDayId].pilar;

        renderSidebarMenu();
        loadLesson(currentDayId);
        updateUIProgress();

      } catch (err) {
        console.error("Failed to initialize course engine:", err);
      }
    }

    // Load dynamic content
    function loadLesson(dayId) {
      if (typeof stopAllSpeech === 'function') stopAllSpeech();
      currentDayId = dayId;
      const day = courseData[dayId];
      if (!day) return;

      // Update URL without refreshing
      const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?day=' + dayId.replace("day", "");
      window.history.pushState({path:newurl},'',newurl);

      document.getElementById("lesson-module-tag").textContent = `Módulo ${day.pilar} • Día ${dayId.replace("day", "")}`;
      document.getElementById("lesson-title").textContent = day.title;
      document.getElementById("lesson-body-content").innerHTML = day.content;
      document.getElementById("lesson-mindset-text").textContent = day.mindset;
      document.getElementById("lesson-challenge-desc").textContent = day.challenge;

      // Load saved challenge response
      const savedResponse = localStorage.getItem(`vision_challenge_${dayId}`) || "";
      document.getElementById("challenge-response-input").value = savedResponse;

      // Draw SVG support graphic
      drawSVGGraphic(day.graphic_desc, parseInt(dayId.replace("day", "")));

      // Render Quiz if it is an exam day
      const dayNum = parseInt(dayId.replace("day", ""));
      const isExam = (dayNum % 7 === 0);
      const quizCard = document.getElementById("exam-quiz-card");

      if (isExam) {
        quizCard.style.display = "block";
        renderQuiz(day.pilar);
      } else {
        quizCard.style.display = "none";
      }

      // Update buttons text
      const nextBtn = document.getElementById("btn-next-lesson");
      if (dayId === "day70") {
        nextBtn.querySelector("span").textContent = "Finalizar Curso";
      } else if (isExam && !progressState.quizzes[day.pilar]) {
        nextBtn.querySelector("span").textContent = "Aprobar Examen";
      } else {
        nextBtn.querySelector("span").textContent = "Siguiente Lección";
      }

      // Update sidebar visual active item
      document.querySelectorAll(".day-item").forEach(item => {
        item.classList.remove("active");
        if (item.getAttribute("data-id") === dayId) {
          item.classList.add("active");
        }
      });

      // Automatically trigger voice narrator for this lesson
      setTimeout(() => {
        const btn = document.getElementById("btn-audio-narrate");
        if (btn && typeof handleNarrateClick === "function") {
          handleNarrateClick(dayId, btn);
        }
      }, 150);
    }

    // Render 10 Pilares Accordion
    function renderSidebarMenu() {
      const container = document.getElementById("sidebar-pillars-menu");
      if (!container) return;

      let html = "";
      pilares.forEach(pilar => {
        const isOpen = activeAccordion === pilar.id;
        html += `
          <div class="pilar-group ${isOpen ? 'open' : ''}" id="pilar-group-${pilar.id}">
            <div class="pilar-header" onclick="toggleAccordion(${pilar.id})" style="padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 600;">
              <span style="display: flex; align-items: center; gap: 8px;">
                <i data-lucide="${pilar.icon}" style="width: 14px; height: 14px; color: ${isOpen ? '#00ffff' : '#9ca3af'}"></i>
                ${pilar.name}
              </span>
              <i data-lucide="${isOpen ? 'chevron-down' : 'chevron-right'}" style="width: 14px; height: 14px; color: #6b7280;"></i>
            </div>
            <div class="pilar-sub-list" style="display: ${isOpen ? 'flex' : 'none'}; flex-direction: column; gap: 4px; padding: 4px 8px; margin-top: 4px;">
        `;

        // Render 7 lessons of this pilar
        for (let i = 1; i <= 7; i++) {
          const dNum = (pilar.id - 1) * 7 + i;
          const dId = "day" + dNum;
          const day = courseData[dId];

          if (day) {
            const isCompleted = progressState.days[dId]?.completed;
            const isUnlocked = progressState.days[dId]?.unlocked;
            const isActive = currentDayId === dId;

            let statusIcon = '<i data-lucide="lock" class="status-locked" style="width:12px; height:12px; opacity: 0.5;"></i>';
            if (isCompleted) {
              statusIcon = '<i data-lucide="check-circle" style="width:12px; height:12px; color:#10b981;"></i>';
            } else if (isUnlocked) {
              statusIcon = '<i data-lucide="circle" style="width:12px; height:12px; color:#00ffff;"></i>';
            }

            html += `
              <div class="day-item ${isActive ? 'active' : ''} ${!isUnlocked ? 'locked' : ''}" data-id="${dId}" onclick="${isUnlocked ? `loadLesson('${dId}')` : 'alert(\'Esta lección está bloqueada. Debes completar las anteriores.\')'}" style="padding: 8px 12px; border-radius: var(--radius-sm); font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; cursor: ${isUnlocked ? 'pointer' : 'not-allowed'}; opacity: ${isUnlocked ? 1 : 0.45}; background: ${isActive ? 'rgba(0, 255, 255, 0.08)' : 'transparent'}; border-left: ${isActive ? '2px solid #00ffff' : 'none'};">
                <span>Día ${dNum}: ${day.title}</span>
                <span>${statusIcon}</span>
              </div>
            `;
          }
        }

        html += `
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      lucide.createIcons();
    }

    window.toggleAccordion = (pilarId) => {
      activeAccordion = activeAccordion === pilarId ? null : pilarId;
      renderSidebarMenu();
    };

    // Render Pilar Quiz
    function renderQuiz(pilarId) {
      const container = document.getElementById("quiz-question-container");
      if (!container) return;

      const pQuizzes = quizzes[pilarId];
      if (!pQuizzes || pQuizzes.length === 0) {
        container.innerHTML = "<p>No hay evaluación disponible para este módulo.</p>";
        return;
      }

      let html = "";
      pQuizzes.forEach((quiz, idx) => {
        const isPassed = progressState.quizzes[pilarId];
        html += `
          <div style="margin-bottom: 20px;">
            <p style="font-size: 0.95rem; color: #f3f4f6; font-weight: 600; margin-bottom: 12px;">P${idx+1}: ${quiz.q}</p>
            <div style="display: flex; flex-direction: column; gap: 8px;">
        `;

        quiz.options.forEach((opt, oIdx) => {
          const isSelected = selectedQuizAnswers[idx] === oIdx;
          const isCorrect = oIdx === quiz.answer;
          let btnStyle = "background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: #f3f4f6;";
          
          if (isSelected) {
            btnStyle = "background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; color: #00ffff;";
          }
          if (isPassed && isCorrect) {
            btnStyle = "background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #10b981;";
          }

          html += `
            <button class="indicator-toggle" onclick="${isPassed ? '' : `selectOption(${idx}, ${oIdx})`}" style="padding: 10px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; text-align: left; cursor: ${isPassed ? 'default' : 'pointer'}; ${btnStyle}">
              ${opt}
            </button>
          `;
        });

        html += `
            </div>
          </div>
        `;
      });

      if (progressState.quizzes[pilarId]) {
        html += `
          <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; padding: 12px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 8px; color: #10b981; font-weight: 600; font-size: 0.85rem;">
            <i data-lucide="check-circle" style="width: 16px; height: 16px;"></i> ¡Evaluación Aprobada! El siguiente módulo está desbloqueado.
          </div>
        `;
      } else {
        html += `

    const getApiKey = () => {

      if (!stored || stored === "null" || stored === "undefined" || stored.trim() === "") {
        return "sk_cf0eff44faa9a9838a53af3850a02dc60c96e883b95570ce";

    let activeAudio = null;
    let activeNarratorButton = null;

    const stopAllSpeech = () => {
      if (activeAudio) {
        activeAudio.pause();
        activeAudio = null;
      }
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
      }
      
      const btn = document.getElementById("btn-audio-narrate");
      if (btn) {
        btn.classList.remove("active");

    const handleNarrateClick = async (dayId, button) => {
      if (button === activeNarratorButton) {
        stopAllSpeech();
        return;
      }

      stopAllSpeech();

      const day = courseData[dayId];
      if (!day) return;

      // Read only the educational content, stripping HTML tags
      const tempDiv = document.createElement("div");
      tempDiv.innerHTML = day.content;
      let textToRead = tempDiv.innerText || tempDiv.textContent || "";

      // Replace $ followed by number with "[number] dólares" and other currency references to avoid TTS pronouncing $ as "pesos"
      textToRead = textToRead.replace(/\$(\d+(?:[.,]\d+)?)/g, "$1 dólares");
      textToRead = textToRead.replace(/\$/g, " dólares ");
      textToRead = textToRead.replace(/USD/gi, " dólares ");

      // Strip Markdown symbols like * or _ to make it read like a natural human voice (no pronouncing "asterisco", etc.)
      textToRead = textToRead.replace(/[*_#`~]/g, "");
      textToRead = textToRead.replace(/\s+/g, " "); // collapse whitespace
      const apiKey = getApiKey();
      const voiceId = getVoiceId();

      if (apiKey) {
        try {
          button.disabled = true;
          button.classList.add("loading");
          button.querySelector("span").textContent = "Generando Audio...";
          
          console.log(`[Narrador] Enviando petición a ElevenLabs. Voice ID: ${voiceId}`);
          
          const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "xi-api-key": apiKey
            },
            body: JSON.stringify({
              text: textToRead.substring(0, 4800), // Safety cap limit
              model_id: "eleven_multilingual_v2",
              voice_settings: {
                stability: 0.75,
                similarity_boost: 0.85,
                style: 0.05,
                use_speaker_boost: true
              }
            })
          });

          if (!response.ok) {
            let errMsg = `Código ${response.status}`;
            try {
              const errJson = await response.json();
              if (errJson && errJson.detail && errJson.detail.message) {
                errMsg = errJson.detail.message;
              }
            } catch (e) {
              errMsg = response.statusText || errMsg;
            }
            throw new Error(errMsg);
          }

          const blob = await response.blob();
          const audioUrl = URL.createObjectURL(blob);
          activeAudio = new Audio(audioUrl);
          
          button.disabled = false;
          button.classList.remove("loading");
          button.classList.add("active");
          button.style.background = "rgba(16, 185, 129, 0.15)";
          button.style.color = "#10b981";
          button.style.borderColor = "#10b981";
          button.querySelector("span").textContent = "Detener Narración";
          button.querySelector("i").setAttribute("data-lucide", "square");
          lucide.createIcons();
          activeNarratorButton = button;

          console.log(`[Narrador] Reproduciendo audio generado por ElevenLabs.`);
          activeAudio.play();
          activeAudio.onended = () => {
            stopAllSpeech();
          };
        } catch (err) {
          button.disabled = false;
          button.classList.remove("loading");
          button.querySelector("span").textContent = "Narrar Lección";
          console.warn(`[Narrador] Error con ElevenLabs: ${err.message}. Usando fallback.`);
          alert(`Error con ElevenLabs: ${err.message}. Usando el narrador gratuito por defecto...`);
          speakBrowser(textToRead, button);
        }
      } else {
        console.log(`[Narrador] No hay API Key configurada. Usando Web Speech API del navegador.`);
        speakBrowser(textToRead, button);
      }
    };

    const speakBrowser = (text, button) => {
      if (!window.speechSynthesis) {
        alert("Tu navegador no soporta síntesis de voz.");
        return;
      }

      window.speechSynthesis.cancel();
      const cleanText = text.replace(/\s+/g, " ").trim();

      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = "es-ES";
      
      const voices = window.speechSynthesis.getVoices();
      // Intentar buscar una voz en español masculina por nombre/palabras clave
      let esVoice = voices.find(v => {
        const nameLower = v.name.toLowerCase();
        const isSpanish = v.lang.startsWith("es-ES") || v.lang.startsWith("es");
        const isMale = nameLower.includes("male") || 
                       nameLower.includes("hombre") || 
                       nameLower.includes("jorge") || 
                       nameLower.includes("alvaro") || 
                       nameLower.includes("david") || 
                       nameLower.includes("julio");
        return isSpanish && isMale;
      });

      if (!esVoice) {
        esVoice = voices.find(v => v.lang.startsWith("es-ES") || v.lang.startsWith("es"));
      }

      if (esVoice) {
        utterance.voice = esVoice;
      }

      utterance.onstart = () => {
        button.classList.add("active");
        button.style.background = "rgba(59, 130, 246, 0.15)";
        button.style.color = "#00d2ff";
        button.style.borderColor = "#00d2ff";
        button.querySelector("span").textContent = "Detener Narración";
        button.querySelector("i").setAttribute("data-lucide", "square");
        lucide.createIcons();
        activeNarratorButton = button;
      };

      utterance.onend = () => {
        stopAllSpeech();
      };

      utterance.onerror = () => {
        stopAllSpeech();
      };

      window.speechSynthesis.speak(utterance);
    };

    function drawCandle(canvas, x, openY, closeY, highY, lowY, width = 7) {
      const isBullish = closeY < openY;
      const color = isBullish ? "#10b981" : "#ef4444";
      
      // Wick
      drawLine(canvas, x, highY, x, lowY, color, 1.2);

      const bodyY = Math.min(openY, closeY);
      const bodyH = Math.max(Math.abs(closeY - openY), 1.5);
      drawRect(canvas, x - width / 2, bodyY, width, bodyH, color, "none", 0, 1);

        drawText(canvas, 250, 116, "#94a3b8", 7.5, "Reserva Fuerte", "middle");
        
        drawRect(canvas, 340, 80, 110, 50, "rgba(255,255,255,0.01)", "#d4af37", 1, 3);
        drawText(canvas, 395, 102, "#d4af37", 8.5, "Activos Indexados", "middle", "bold");
        drawText(canvas, 395, 116, "#94a3b8", 7.5, "Rendimiento Pasivo", "middle");
        
        drawText(canvas, 250, 165, "El trading capitaliza; el capital invisible te hace libre de forma silenciosa", "#10b981", 9, "middle", "bold");
      }
      else if (type === "chart_checklist") {
        drawText(canvas, 250, 50, "#00ffff", 11, "Checklist de Alta Probabilidad - Albert Sierra", "middle", "bold");
        
        const checks = [
          "✓ Estructura de fondo H4 / Bias Diario Alineado",
          "✓ Retorno del precio a POI (Order Block) no mitigado",
          "✓ Cambio de Carácter (CHoCH) en temporalidad de entrada (M1/M5)",
          "✓ Vacío de Liquidez (FVG) local de entrada definido",
          "✓ Gestión de riesgo calculada rigurosamente (1.0% máximo)"
        ];
        
        checks.forEach((chk, i) => {
          const y = 72 + i * 22;
          drawText(canvas, 60, y, "#10b981", 8.5, chk.substring(0, 1), "left", "bold");
          drawText(canvas, 75, y, "#f3f4f6", 8.5, chk.substring(2));
        });
      }
      else {
        // Fallback Premium TradingView Chart
        drawText(canvas, 250, 48, "#dfb750", 10.5, "Gráfico Técnico Ecosistema-AS", "middle", "bold");
        
        drawPath(canvas, "M 60,160 L 120,90 L 180,120 L 260,60 L 320,90 L 400,40 L 450,70", "rgba(59, 130, 246, 0.4)", 1.5);
        drawPath(canvas, "M 60,165 Q 160,140 260,125 T 440,75", "#00ffff", 2.2, "", "url(#glow)");
        drawCircle(canvas, 260, 125, 4.5, "#dfb750", "url(#gold-glow)");
        
        drawText(canvas, 260, 145, "#dfb750", 8.5, "Zona de Confluencia", "middle", "bold");
      }
    }

    // Helper drawing functions
    function drawPath(canvas, d, color, width, dash = "", filter = "") {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "path");
      el.setAttribute("d", d);
      el.setAttribute("fill", "none");
      el.setAttribute("stroke", color);
      el.setAttribute("stroke-width", width);
      if (dash) el.setAttribute("stroke-dasharray", dash);
      if (filter) el.setAttribute("filter", filter);
      canvas.appendChild(el);
    }
    function drawLine(canvas, x1, y1, x2, y2, color, width, dash = "") {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "line");
      el.setAttribute("x1", x1);
      el.setAttribute("y1", y1);
      el.setAttribute("x2", x2);
      el.setAttribute("y2", y2);
      el.setAttribute("stroke", color);
      el.setAttribute("stroke-width", width);
      if (dash) el.setAttribute("stroke-dasharray", dash);
      canvas.appendChild(el);
    }
    function drawCircle(canvas, cx, cy, r, color, filter = "") {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      el.setAttribute("cx", cx);
      el.setAttribute("cy", cy);
      el.setAttribute("r", r);
      el.setAttribute("fill", color);
      if (filter) el.setAttribute("filter", filter);
      canvas.appendChild(el);
    }
    function drawRect(canvas, x, y, w, h, fill, stroke = "none", sw = 1, rx = 0) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      el.setAttribute("x", x);
      el.setAttribute("y", y);
      el.setAttribute("width", w);
      el.setAttribute("height", h);
      el.setAttribute("fill", fill);
      if (rx) {
        el.setAttribute("rx", rx);
      }
      if (stroke !== "none") {
        el.setAttribute("stroke", stroke);
        el.setAttribute("stroke-width", sw);
      }
      canvas.appendChild(el);
    }
    function drawText(canvas, x, y, fill, size, text, align = "left", weight = "normal", font = "Inter, sans-serif") {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "text");
      el.setAttribute("x", x);
      el.setAttribute("y", y);
      el.setAttribute("fill", fill);
      el.setAttribute("font-size", size);
      el.setAttribute("font-family", font);
      el.setAttribute("font-weight", weight);
      el.setAttribute("text-anchor", align === "middle" ? "middle" : (align === "right" ? "end" : "start"));
      el.textContent = text;
      canvas.appendChild(el);
    }    // Launch
    window.addEventListener("DOMContentLoaded", init);
  </script>
